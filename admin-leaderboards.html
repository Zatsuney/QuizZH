<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Gestion des Leaderboards</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-card">
            <div class="admin-header">
                <div>
                    <h1>Quiz<span class="highlight">ZH</span> - Gestion des Leaderboards</h1>
                </div>
                <div class="admin-header-buttons">
                    <a href="admin-menu.html" class="btn-back-admin">← Menu Principal</a>
                    <button id="adminLogoutBtn" class="btn-logout">Déconnexion</button>
                </div>
            </div>

            <div class="admin-content">
                <!-- Leaderboards Management -->
                <div class="admin-section">
                    <h2>Leaderboards des Joueurs</h2>
                    <p>Consultez les classements globaux et par thème</p>

                    <div class="leaderboard-controls">
                        <div class="control-group">
                            <label for="lbThemeFilter">Sélectionner un thème:</label>
                            <select id="lbThemeFilter">
                                <option value="global">Classement Global</option>
                                <option value="all">Tous les Thèmes</option>
                                <option value="sciences">Sciences</option>
                                <option value="tech">Tech</option>
                                <option value="geo">Géographie</option>
                                <option value="culture-pop">Culture Pop</option>
                                <option value="histoire">Histoire</option>
                                <option value="arts">Arts & Divertissement</option>
                                <option value="musique">Musique</option>
                                <option value="jeux-videos">Jeux-Vidéos</option>
                            </select>
                        </div>

                        <div class="control-group" id="difficultyGroup" style="display: none;">
                            <label for="lbDifficultyFilter">Sélectionner la difficulté:</label>
                            <select id="lbDifficultyFilter">
                                <option value="easy">Facile</option>
                                <option value="medium">Moyen</option>
                                <option value="hard">Difficile</option>
                            </select>
                        </div>

                        <button id="refreshLbBtn" class="btn-refresh">🔄 Rafraîchir</button>
                    </div>

                    <div id="leaderboardDisplay" class="leaderboard-display">
                        <div class="leaderboard-table-wrapper">
                            <table class="leaderboard-table">
                                <thead>
                                    <tr>
                                        <th>Rang</th>
                                        <th>Joueur</th>
                                        <th>Niveau</th>
                                        <th>XP Total</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboardBody">
                                    <tr><td colspan="5" class="empty-state">Chargement...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="admin-section stats-section">
                    <h2>Statistiques Globales</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <p class="stat-label">Total Joueurs</p>
                            <h3 id="totalPlayers">0</h3>
                        </div>
                        <div class="stat-card">
                            <p class="stat-label">Joueurs Actifs</p>
                            <h3 id="activePlayers">0</h3>
                        </div>
                        <div class="stat-card">
                            <p class="stat-label">XP Total</p>
                            <h3 id="totalXP">0</h3>
                        </div>
                        <div class="stat-card">
                            <p class="stat-label">Parties Jouées</p>
                            <h3 id="totalGames">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/admin-leaderboards.js"></script>
</body>
</html>
