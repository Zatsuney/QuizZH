<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Connexion Admin</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card admin-login-card">
            <div class="back-button">
                <a href="index.html" class="btn-back">← Retour</a>
            </div>
            
            <h1>Quiz<span class="highlight">ZH</span></h1>
            <p class="subtitle">Espace Administrateur</p>
            <p class="admin-subtitle">Connectez-vous avec vos identifiants</p>
            
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="adminName">Pseudo</label>
                    <input 
                        type="text" 
                        id="adminName" 
                        placeholder="Votre pseudo" 
                        required
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">Mot de passe</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="adminPassword" 
                            placeholder="Votre mot de passe" 
                            required
                        >
                        <button 
                            type="button" 
                            class="btn-toggle-password" 
                            id="togglePasswordBtn"
                            title="Afficher/Masquer le mot de passe"
                        >
                            👁️
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login btn-admin">Se connecter</button>
                <div class="loading-indicator" id="loadingIndicator" style="display: none;">
                    <span>Connexion en cours...</span>
                </div>
            </form>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="admin-info-text">
                <p>🔐 Seuls les administrateurs autorisés peuvent accéder</p>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/admin-login.js"></script>
</body>
</html>
