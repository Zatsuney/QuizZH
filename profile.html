<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Profil</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>Mon Profil</h1>
                <button id="logoutBtn" class="btn-logout">Déconnexion</button>
            </div>

            <!-- Player Info Section -->
            <div class="player-info-section">
                <!-- Player Avatar -->
                <div class="avatar-section">
                    <div class="avatar-container">
                        <div id="playerAvatar" class="player-avatar"></div>
                        <button id="changeAvatarBtn" class="btn-change-avatar">✏️</button>
                    </div>
                </div>

                <!-- Avatar Selection Modal -->
                <div id="avatarModal" class="avatar-modal" style="display: none;">
                    <div class="avatar-modal-content">
                        <h3>Choisir un avatar</h3>
                        <div class="avatar-grid">
                            <!-- Avatars will be generated by JavaScript -->
                        </div>
                        <button id="closeAvatarModal" class="btn-close-modal">Fermer</button>
                    </div>
                </div>

                <div class="player-name-box">
                    <p class="label">Pseudo du Joueur</p>
                    <div class="name-edit-group">
                        <h2 id="playerName"></h2>
                        <button id="editNameBtn" class="btn-edit-name">✏️ Modifier</button>
                    </div>
                    <div id="nameEditForm" class="name-edit-form" style="display: none;">
                        <input 
                            type="text" 
                            id="newNameInput" 
                            placeholder="Nouveau pseudo"
                            maxlength="20"
                        >
                        <button id="saveName" class="btn-save-name">Enregistrer</button>
                        <button id="cancelName" class="btn-cancel-name">Annuler</button>
                        <span id="nameError" class="name-error" style="display: none;"></span>
                    </div>
                </div>

                <div class="player-stats-grid">
                    <div class="stat-box">
                        <p class="label">Niveau</p>
                        <h3 id="playerLevel">1</h3>
                    </div>
                    <div class="stat-box">
                        <p class="label">XP Total</p>
                        <h3 id="playerXP">0</h3>
                    </div>
                </div>

                <div class="progress-section level-progress">
                    <p class="progress-label">Progression Niveau <span id="currentLevel">1</span></p>
                    <div class="xp-progress-bar">
                        <div class="xp-progress-fill" id="xpProgressBar"></div>
                    </div>
                    <p class="progress-text" id="progressText">0 / 600 XP</p>
                </div>
            </div>

            <!-- Theme Stats Section -->
            <div class="theme-stats-section">
                <h3>Statistiques par Thème</h3>
                <div id="themeStatsContainer" class="theme-stats-grid">
                    <!-- Theme stats will be inserted here -->
                </div>
            </div>

            <!-- Back Button -->
            <div class="profile-footer">
                <a href="game-mode-selection.html" class="btn-back-profile">← Retour au menu</a>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/profile.js"></script>
</body>
</html>
