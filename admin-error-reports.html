<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Gestion des Signalements</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="admin-panel-container">
        <div class="admin-panel-header">
            <div class="header-left">
                <a href="admin-menu.html" class="btn-back">← Retour au menu</a>
                <h1>Gestion des Signalements d'Erreurs 🚩</h1>
            </div>
            <button id="adminLogoutBtn" class="btn-logout">Déconnexion</button>
        </div>

        <div class="admin-panel-content">
            <!-- Filters -->
            <div class="filters-section">
                <h3>Filtres</h3>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="filterTheme">Thème:</label>
                        <select id="filterTheme">
                            <option value="">Tous les thèmes</option>
                            <option value="sciences">Sciences</option>
                            <option value="tech">Tech</option>
                            <option value="geo">Géographie</option>
                            <option value="culture-pop">Culture Pop</option>
                            <option value="histoire">Histoire</option>
                            <option value="arts">Arts & Divertissement</option>
                            <option value="musique">Musique</option>
                            <option value="jeux-videos">Jeux-Vidéos</option>
                            <option value="all">Tous les Thèmes</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="filterDifficulty">Difficulté:</label>
                        <select id="filterDifficulty">
                            <option value="">Toutes les difficultés</option>
                            <option value="easy">Facile</option>
                            <option value="medium">Moyen</option>
                            <option value="hard">Difficile</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="filterStatus">Statut:</label>
                        <select id="filterStatus">
                            <option value="">Tous les statuts</option>
                            <option value="pending">En attente</option>
                            <option value="resolved">Résolu</option>
                        </select>
                    </div>
                </div>
                <button id="applyFiltersBtn" class="btn-apply-filters">Appliquer les filtres</button>
            </div>

            <!-- Stats -->
            <div class="reports-stats">
                <div class="stat-card">
                    <h4 id="totalReports">0</h4>
                    <p>Signalements total</p>
                </div>
                <div class="stat-card">
                    <h4 id="pendingReports">0</h4>
                    <p>En attente</p>
                </div>
                <div class="stat-card">
                    <h4 id="resolvedReports">0</h4>
                    <p>Résolus</p>
                </div>
            </div>

            <!-- Reports List -->
            <div class="reports-section">
                <h3>Signalements (
                    <span id="displayedCount">0</span> / <span id="totalCount">0</span>)
                </h3>

                <div id="reportsList" class="reports-list">
                    <!-- Reports will be displayed here -->
                </div>

                <div id="noReports" class="empty-state" style="display: none;">
                    <p>Aucun signalement trouvé</p>
                </div>

                <div id="loadingSpinner" class="loading-indicator" style="display: none;">
                    <p>Chargement des signalements...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for report details -->
    <div id="reportDetailModal" class="modal-overlay" style="display: none;">
        <div class="modal-content report-modal">
            <div class="modal-header">
                <h3>Détails du Signalement</h3>
                <button class="modal-close" onclick="closeReportModal()">✕</button>
            </div>
            <div class="modal-body">
                <div id="reportDetails"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeReportModal()">Fermer</button>
                <button id="markResolvedBtn" class="btn-submit" onclick="markReportAsResolved()">Marquer comme résolu</button>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/admin-error-reports.js"></script>
</body>
</html>
