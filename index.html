<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Connexion</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Quiz<span class="highlight">ZH</span></h1>
            <p class="subtitle">Créez un compte ou connectez-vous</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="votre.email@exemple.com" 
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Au moins 6 caractères" 
                        required
                    >
                </div>

                <div class="form-group" id="displayNameGroup" style="display: none;">
                    <label for="displayName">Nom d'affichage</label>
                    <input 
                        type="text" 
                        id="displayName" 
                        placeholder="Votre surnom pour le quiz"
                    >
                </div>

                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="auth-toggle">
                <span id="toggleText">Pas encore de compte? </span>
                <a href="#" id="toggleLink">Créer un compte</a>
            </div>
            
            <div class="login-divider">OU</div>
            
            <button type="button" id="googleSignInBtn" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuer avec Google
            </button>
            
            <div class="info-text">
                <p>🔐 Vos données sont sécurisées avec Firebase</p>
            </div>
            
            <div class="admin-link-section">
                <p>Vous êtes administrateur ?</p>
                <a href="admin-login.html" class="btn-admin-link">Accès Admin</a>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/app-login.js"></script>
</body>
</html>
