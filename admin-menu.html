<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz ZH - Menu Admin</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="admin-menu-container">
        <div class="admin-menu-card">
            <div class="admin-menu-header">
                <h1>Quiz<span class="highlight">ZH</span> Admin</h1>
                <button id="adminLogoutBtn" class="btn-logout">Déconnexion</button>
            </div>

            <div class="admin-menu-content">
                <p class="menu-subtitle">Bienvenue Administrateur</p>
                <p class="menu-greeting">Que souhaitez-vous gérer?</p>

                <div class="admin-menu-grid">
                    <!-- Gestion des Leaderboards -->
                    <div class="admin-menu-card-item">
                        <a href="admin-leaderboards.html" class="menu-link">
                            <div class="menu-icon">🏆</div>
                            <h2>Gestion des Leaderboards</h2>
                            <p>Voir et gérer les classements des joueurs</p>
                        </a>
                    </div>

                    <!-- Gestion des Tournois -->
                    <div class="admin-menu-card-item">
                        <a href="admin-panel.html" class="menu-link">
                            <div class="menu-icon">🎮</div>
                            <h2>Gestion des Tournois</h2>
                            <p>Lancer et gérer les manches de tournoi</p>
                        </a>
                    </div>

                    <!-- Gestion des Signalements -->
                    <div class="admin-menu-card-item">
                        <a href="admin-error-reports.html" class="menu-link">
                            <div class="menu-icon">🚩</div>
                            <h2>Gestion des Signalements</h2>
                            <p>Voir et traiter les erreurs signalées</p>
                        </a>
                    </div>
                </div>
            </div>

            <div class="admin-menu-footer">
                <p>Session Admin ID: <span id="sessionId">-</span></p>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/admin-menu.js"></script>
</body>
</html>
